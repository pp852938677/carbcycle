<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>CarbCycle Pro</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
:root {
  --bg: #06060c;
  --surface: rgba(255,255,255,0.035);
  --surface2: rgba(255,255,255,0.06);
  --surface3: rgba(255,255,255,0.09);
  --glass: rgba(255,255,255,0.05);
  --glass-border: rgba(255,255,255,0.07);
  --accent: #ff2d55;
  --accent-glow: rgba(255,45,85,0.25);
  --green: #30d158;
  --green-dim: rgba(48,209,88,0.10);
  --orange: #ff9f0a;
  --orange-dim: rgba(255,159,10,0.10);
  --blue: #0a84ff;
  --cyan: #64d2ff;
  --purple: #bf5af2;
  --text: #f5f5f7;
  --text2: rgba(255,255,255,0.40);
  --text3: rgba(255,255,255,0.20);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; min-height:100dvh; overflow-x:hidden; line-height:1.4; }

/* === AMBIENT === */
.ambience { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
.orb { position:absolute; border-radius:50%; filter:blur(90px); opacity:0.45; }
.orb1 { width:320px; height:320px; background:radial-gradient(circle,rgba(255,45,85,0.14),transparent 70%); top:-100px; right:-80px; animation:f1 25s ease-in-out infinite; }
.orb2 { width:260px; height:260px; background:radial-gradient(circle,rgba(10,132,255,0.09),transparent 70%); bottom:15%; left:-90px; animation:f2 30s ease-in-out infinite; }
.orb3 { width:220px; height:220px; background:radial-gradient(circle,rgba(191,90,242,0.07),transparent 70%); top:35%; right:-50px; animation:f3 22s ease-in-out infinite; }
@keyframes f1{0%,100%{transform:translate(0,0)}33%{transform:translate(-35px,45px)}66%{transform:translate(25px,-25px)}}
@keyframes f2{0%,100%{transform:translate(0,0)}50%{transform:translate(45px,-35px)}}
@keyframes f3{0%,100%{transform:translate(0,0)}50%{transform:translate(-25px,35px)}}

.app { max-width:430px; margin:0 auto; padding:0 20px 110px; position:relative; z-index:1; }

/* === USER SWITCHER === */
.user-bar { display:flex; gap:8px; padding:56px 0 6px; overflow-x:auto; scrollbar-width:none; }
.user-bar::-webkit-scrollbar { display:none; }
.u-chip { display:flex; align-items:center; gap:8px; padding:10px 18px; border-radius:50px; font-size:13px; font-weight:700; cursor:pointer; transition:all 0.3s cubic-bezier(0.4,0,0.2,1); white-space:nowrap; border:1px solid transparent; flex-shrink:0; }
.u-chip .u-avatar { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; }
.u-chip.off { background:var(--surface); color:var(--text2); }
.u-chip.off .u-avatar { background:var(--surface2); }
.u-chip.on { background:rgba(255,45,85,0.10); color:var(--accent); border-color:rgba(255,45,85,0.2); box-shadow:0 0 20px rgba(255,45,85,0.08); }
.u-chip.on .u-avatar { background:rgba(255,45,85,0.15); }

/* === HEADER === */
.header { padding:20px 0 8px; }
.brand { display:flex; align-items:center; gap:8px; margin-bottom:14px; }
.brand-dot { width:8px; height:8px; border-radius:50%; background:var(--accent); box-shadow:0 0 12px var(--accent-glow); }
.brand-name { font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--text2); }
.header h1 { font-size:32px; font-weight:800; letter-spacing:-0.5px; line-height:1.1; }
.header h1 span { background:linear-gradient(135deg,#fff 30%,var(--text2) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.tagline { font-size:14px; color:var(--text2); margin-top:6px; font-weight:400; }

/* === PROGRESS RING === */
.ring-section { display:flex; justify-content:center; padding:28px 0 20px; }
.ring-outer { position:relative; width:190px; height:190px; }
.ring-outer svg { width:100%; height:100%; transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:var(--surface2); stroke-width:10; }
.ring-fg { fill:none; stroke-width:10; stroke-linecap:round; transition:stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1); }
.ring-info { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.ring-val { font-size:42px; font-weight:900; letter-spacing:-2px; }
.ring-unit { font-size:12px; color:var(--text2); font-weight:500; margin-top:-2px; }
.ring-pct { font-size:11px; font-weight:700; color:var(--accent); margin-top:5px; padding:4px 12px; background:rgba(255,45,85,0.1); border-radius:20px; }

/* === STATS === */
.stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
.s-card { background:var(--surface); border:1px solid var(--glass-border); border-radius:20px; padding:16px 10px; text-align:center; transition:transform 0.2s; }
.s-card:active { transform:scale(0.96); }
.s-icon { font-size:22px; margin-bottom:6px; }
.s-val { font-size:26px; font-weight:800; letter-spacing:-1px; }
.s-lbl { font-size:9px; color:var(--text2); margin-top:3px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; }

/* === PHASE BANNER === */
.phase { border-radius:20px; padding:18px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; }
.phase-low { background:linear-gradient(135deg,rgba(48,209,88,0.07),rgba(48,209,88,0.02)); border:1px solid rgba(48,209,88,0.12); }
.phase-high { background:linear-gradient(135deg,rgba(255,159,10,0.07),rgba(255,159,10,0.02)); border:1px solid rgba(255,159,10,0.12); }
.phase-left { display:flex; align-items:center; gap:12px; }
.phase-icon { width:44px; height:44px; border-radius:13px; display:flex; align-items:center; justify-content:center; font-size:20px; }
.phase-low .phase-icon { background:var(--green-dim); }
.phase-high .phase-icon { background:var(--orange-dim); }
.phase-title { font-size:16px; font-weight:700; }
.phase-sub { font-size:11px; color:var(--text2); margin-top:2px; }
.phase-cal { font-size:22px; font-weight:800; letter-spacing:-1px; }
.phase-low .phase-cal { color:var(--green); }
.phase-high .phase-cal { color:var(--orange); }
.phase-kcal { font-size:10px; color:var(--text2); }

/* === MACROS === */
.macros { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; margin-bottom:20px; }
.m-card { background:var(--surface); border-radius:20px; padding:16px 12px; position:relative; overflow:hidden; }
.m-card::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; }
.m-p::after { background:linear-gradient(90deg,var(--accent),#ff6b8a); }
.m-f::after { background:linear-gradient(90deg,var(--orange),#ffcc02); }
.m-c::after { background:linear-gradient(90deg,var(--cyan),var(--blue)); }
.m-val { font-size:24px; font-weight:800; letter-spacing:-1px; }
.m-p .m-val { color:var(--accent); }
.m-f .m-val { color:var(--orange); }
.m-c .m-val { color:var(--cyan); }
.m-lbl { font-size:9px; color:var(--text2); margin-top:3px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; }
.m-bar { height:3px; background:var(--surface2); border-radius:2px; margin-top:8px; overflow:hidden; }
.m-bar-fill { height:100%; border-radius:2px; transition:width 1s cubic-bezier(0.4,0,0.2,1); }
.m-p .m-bar-fill { background:linear-gradient(90deg,var(--accent),#ff6b8a); }
.m-f .m-bar-fill { background:linear-gradient(90deg,var(--orange),#ffcc02); }
.m-c .m-bar-fill { background:linear-gradient(90deg,var(--cyan),var(--blue)); }

/* === CHART === */
.chart-card { border-radius:24px; padding:22px; margin-bottom:20px; background:var(--surface); border:1px solid var(--glass-border); }
.chart-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; }
.chart-head h3 { font-size:16px; font-weight:700; }
.chart-area { width:100%; height:150px; }

/* === FORM === */
.form-card { border-radius:24px; padding:22px; margin-bottom:20px; background:var(--surface); border:1px solid var(--glass-border); }
.form-card h3 { font-size:16px; font-weight:700; margin-bottom:18px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:10px; color:var(--text2); margin-bottom:6px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; }
.field input,.field textarea { width:100%; padding:14px 16px; border-radius:14px; border:1px solid var(--glass-border); background:var(--bg); color:var(--text); font-size:15px; font-family:'Inter',sans-serif; outline:none; transition:all 0.3s; }
.field input::placeholder,.field textarea::placeholder { color:var(--text3); }
.field input:focus,.field textarea:focus { border-color:rgba(255,45,85,0.4); box-shadow:0 0 0 4px rgba(255,45,85,0.06); }
.field textarea { height:70px; resize:none; }

/* === QUICK SELECT CHIPS === */
.chip-wrap { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
.chip-wrap label { font-size:10px; color:var(--text2); font-weight:600; letter-spacing:1.5px; text-transform:uppercase; width:100%; margin-bottom:-2px; }
.chip { padding:10px 16px; border-radius:12px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.25s cubic-bezier(0.4,0,0.2,1); border:1px solid var(--glass-border); background:var(--bg); color:var(--text2); user-select:none; }
.chip:active { transform:scale(0.95); }
.chip.sel { background:rgba(255,45,85,0.10); color:var(--accent); border-color:rgba(255,45,85,0.25); box-shadow:0 0 16px rgba(255,45,85,0.06); }
.chip.sel-green { background:var(--green-dim); color:var(--green); border-color:rgba(48,209,88,0.2); }
.chip.sel-orange { background:var(--orange-dim); color:var(--orange); border-color:rgba(255,159,10,0.2); }
.chip.sel-blue { background:rgba(10,132,255,0.10); color:var(--blue); border-color:rgba(10,132,255,0.2); }
.chip.sel-purple { background:rgba(191,90,242,0.10); color:var(--purple); border-color:rgba(191,90,242,0.2); }
.chip.sel-cyan { background:rgba(100,210,255,0.10); color:var(--cyan); border-color:rgba(100,210,255,0.2); }

/* Toggle */
.tog-wrap { display:flex; gap:0; background:var(--bg); border-radius:14px; padding:4px; margin-bottom:14px; border:1px solid var(--glass-border); }
.tog { flex:1; padding:12px; text-align:center; border-radius:11px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.3s; color:var(--text3); }
.tog.sel-low { background:var(--green-dim); color:var(--green); }
.tog.sel-high { background:var(--orange-dim); color:var(--orange); }

/* === WATER TRACKER === */
.water-section { margin-bottom:14px; }
.water-section label { display:block; font-size:10px; color:var(--text2); margin-bottom:8px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; }
.water-row { display:flex; align-items:center; gap:10px; }
.water-dots { display:flex; gap:6px; flex:1; }
.water-dot { width:32px; height:32px; border-radius:10px; border:1px solid var(--glass-border); background:var(--bg); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; font-size:14px; }
.water-dot.filled { background:rgba(10,132,255,0.12); border-color:rgba(10,132,255,0.25); }
.water-count { font-size:14px; font-weight:700; color:var(--blue); min-width:40px; text-align:right; }

/* === MOOD === */
.mood-row { display:flex; gap:8px; margin-bottom:14px; }
.mood-row label { font-size:10px; color:var(--text2); font-weight:600; letter-spacing:1.5px; text-transform:uppercase; width:100%; margin-bottom:-2px; }
.mood-btn { flex:1; padding:10px; text-align:center; border-radius:12px; border:1px solid var(--glass-border); background:var(--bg); cursor:pointer; font-size:20px; transition:all 0.2s; }
.mood-btn:active { transform:scale(0.92); }
.mood-btn.sel { border-color:rgba(255,45,85,0.3); background:rgba(255,45,85,0.08); box-shadow:0 0 12px rgba(255,45,85,0.06); }

/* Button */
.btn { width:100%; padding:16px; border:none; border-radius:14px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; letter-spacing:0.5px; }
.btn:active { transform:scale(0.97); }
.btn-primary { background:linear-gradient(135deg,var(--accent) 0%,#ff6b8a 100%); color:#fff; box-shadow:0 8px 32px var(--accent-glow); }

/* === HISTORY === */
.hist-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.hist-head h3 { font-size:16px; font-weight:700; }
.h-item { background:var(--surface); border:1px solid var(--glass-border); border-radius:18px; padding:16px 18px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; transition:transform 0.2s; position:relative; }
.h-item:active { transform:scale(0.98); }
.h-l .h-date { font-size:14px; font-weight:700; }
.h-l .h-meta { font-size:11px; color:var(--text2); margin-top:3px; display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.h-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.h-dot-low { background:var(--green); box-shadow:0 0 6px rgba(48,209,88,0.4); }
.h-dot-high { background:var(--orange); box-shadow:0 0 6px rgba(255,159,10,0.4); }
.h-r { text-align:right; }
.h-w { font-size:26px; font-weight:800; letter-spacing:-1px; }
.h-diff { font-size:11px; font-weight:700; margin-top:2px; }
.h-down { color:var(--green); }
.h-up { color:#ff453a; }
.h-same { color:var(--text3); }
.h-del { position:absolute; top:8px; right:10px; width:20px; height:20px; border-radius:10px; background:rgba(255,69,58,0.1); color:#ff453a; border:none; font-size:11px; cursor:pointer; display:none; align-items:center; justify-content:center; }
.h-item:hover .h-del { display:flex; }

/* === PLAN PAGE === */
.cycle-preview { display:flex; gap:5px; margin:18px 0; }
.cy-d { flex:1; border-radius:12px; padding:10px 3px; text-align:center; font-size:10px; font-weight:700; transition:transform 0.2s; }
.cy-d:active { transform:scale(0.95); }
.cy-low { background:var(--green-dim); color:var(--green); }
.cy-high { background:var(--orange-dim); color:var(--orange); }
.cy-today { box-shadow:0 0 0 2px var(--accent); }
.cy-label { font-size:8px; color:var(--text3); margin-bottom:3px; display:block; }
.plan-glass { background:var(--surface); border:1px solid var(--glass-border); border-radius:22px; padding:22px; margin-bottom:14px; }
.plan-glass h3 { font-size:16px; font-weight:700; margin-bottom:14px; display:flex; align-items:center; gap:10px; }
.p-dot { width:10px; height:10px; border-radius:50%; }
.p-row { display:flex; justify-content:space-between; padding:11px 0; border-bottom:1px solid var(--glass-border); font-size:13px; }
.p-row:last-child { border:none; }
.p-v { font-weight:700; }
.food-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-top:12px; }
.food-chip { background:var(--bg); border-radius:11px; padding:10px 12px; font-size:12px; font-weight:500; border:1px solid var(--glass-border); }
.food-warn { color:#ff453a; font-size:12px; margin-top:12px; font-weight:600; }

/* === SETTINGS === */
.set-card { background:var(--surface); border:1px solid var(--glass-border); border-radius:22px; padding:22px; margin-bottom:14px; }
.set-card h3 { font-size:16px; font-weight:700; margin-bottom:14px; }
.set-row { display:flex; justify-content:space-between; align-items:center; padding:12px 0; border-bottom:1px solid var(--glass-border); }
.set-row:last-child { border:none; }
.set-row span { font-size:14px; }
.set-val { font-size:14px; font-weight:600; color:var(--text2); }
.set-btn { padding:8px 16px; border-radius:10px; border:1px solid var(--glass-border); background:var(--surface2); color:var(--text); font-size:13px; font-weight:600; cursor:pointer; }
.set-btn:active { transform:scale(0.96); }
.danger-btn { color:#ff453a; border-color:rgba(255,69,58,0.2); background:rgba(255,69,58,0.06); }

/* === NAV === */
.nav { position:fixed; bottom:0; left:0; right:0; z-index:100; }
.nav-inner { max-width:430px; margin:0 auto; background:rgba(6,6,12,0.88); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px); border-top:1px solid var(--glass-border); display:flex; padding:6px 0 calc(6px + env(safe-area-inset-bottom)); }
.n-item { flex:1; text-align:center; cursor:pointer; padding:7px 0; }
.n-ico { font-size:22px; opacity:0.3; transition:all 0.2s; }
.n-lbl { font-size:9px; color:var(--text3); font-weight:600; letter-spacing:0.5px; margin-top:2px; transition:color 0.2s; }
.n-item.on .n-ico { opacity:1; }
.n-item.on .n-lbl { color:var(--accent); }

/* Animations */
@keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.an{animation:rise 0.5s cubic-bezier(0.16,1,0.3,1) forwards}
.d0{animation-delay:0s;opacity:0}.d1{animation-delay:0.05s;opacity:0}.d2{animation-delay:0.1s;opacity:0}
.d3{animation-delay:0.15s;opacity:0}.d4{animation-delay:0.2s;opacity:0}.d5{animation-delay:0.25s;opacity:0}
.d6{animation-delay:0.3s;opacity:0}.d7{animation-delay:0.35s;opacity:0}

/* Toast */
.toast-wrap { position:fixed; top:0; left:0; right:0; z-index:999; display:flex; justify-content:center; padding-top:60px; pointer-events:none; }
.toast { background:rgba(30,30,40,0.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border:1px solid var(--glass-border); color:#fff; padding:12px 24px; border-radius:14px; font-size:14px; font-weight:600; opacity:0; transform:translateY(-20px) scale(0.9); transition:all 0.4s cubic-bezier(0.16,1,0.3,1); }
.toast.show { opacity:1; transform:translateY(0) scale(1); }

.empty-state { text-align:center; padding:36px 20px; }
.empty-state .em-icon { font-size:44px; margin-bottom:14px; opacity:0.3; }
.empty-state .em-text { font-size:13px; color:var(--text3); line-height:1.6; }
</style>
</head>
